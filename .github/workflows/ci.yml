name: CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request: {}

env:
  COLUMNS: 150

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - id: cache-rust
        name: cache rust
        uses: Swatinem/rust-cache@v2

      - run: cargo install rustfilt coverage-prepare
        if: steps.cache-rust.outputs.cache-hit != 'true'

      - run: rustup component add llvm-tools-preview

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: py313-testing
          cache: true
          locked: true

      - run: rustc --version --verbose

      - run: |
          rm -f netext/*.so
          pixi run -e py313-testing maturin develop
        env:
          RUST_BACKTRACE: 1
          RUSTFLAGS: '-C instrument-coverage'

      - run: pixi run -e py313-testing pytest tests

      - run: pixi run -e py313-testing coverage run -m pytest

      - run: ls -lha
      - run: pixi run -e py313-testing coverage xml

      - run: coverage-prepare lcov netext/*.so

      - uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-python:
    name: test ${{ matrix.pixi-env }}
    strategy:
      fail-fast: false
      matrix:
        pixi-env: [py310-testing, py311-testing, py312-testing, py313-testing]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: test-v3

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: ${{ matrix.pixi-env }}
          cache: true
          locked: true

      - run: pixi run -e ${{ matrix.pixi-env }} pytest tests

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot_report_${{ matrix.pixi-env }}
          path: tests/snapshot_tests/output/snapshot_report.html

  test-os:
    name: test on ${{ matrix.os }}
    needs: [test-python]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]

    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: py313-testing
          cache: true
          locked: true

      - run: pixi run -e py313-testing pytest tests
        if: matrix.os != 'windows'

      - run: pixi run -e py313-testing pytest --ignore=tests/snapshot_tests
        if: matrix.os == 'windows'

      - run: pixi run -e py313-testing cargo-test
        if: matrix.os == 'macos'

      - run: pixi run -e py313-testing cargo test
        if: matrix.os != 'macos'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot_report_${{ matrix.os }}
          path: tests/snapshot_tests/output/snapshot_report.html

  # test with a debug build as it picks up errors which optimised release builds do not
  test-debug:
    name: test-debug
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: py313-testing
          cache: true
          locked: true

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - run: |
          rm -f netext/*.so
          pixi run -e py313-testing maturin develop

      - run: pixi run -e py313-testing pytest tests

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: linting
          cache: true
          locked: true

      - run: pixi run -e linting ruff check
      - run: pixi run -e linting ruff format --check
      - run: pixi run -e linting ty check netext

  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: test-v3

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: docs
          cache: true
          locked: true

      - run: pixi run -e docs mkdocs build

  build-sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: pypi_files_sdist
          path: dist

  build:
    name: build on ${{ matrix.os }} (${{ matrix.target }} - ${{ matrix.interpreter || 'all' }}${{ matrix.os == 'linux' && format(' - {0}', matrix.manylinux == 'auto' && 'manylinux' || matrix.manylinux) || '' }})
    # only run on push to main and on release
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos, windows]
        target: [x86_64, aarch64]
        manylinux: [auto]
        include:
          # musllinux
          - os: linux
            manylinux: musllinux_1_1
            target: x86_64
          - os: linux
            manylinux: musllinux_1_1
            target: aarch64

        exclude:
          - os: windows
            target: aarch64

    runs-on: ${{ (matrix.os == 'linux' && 'ubuntu') || matrix.os }}-latest
    steps:
      - uses: actions/checkout@v4

      # maturin-action needs a host Python for macOS/Windows wheel builds.
      # On Linux this is ignored since builds run inside manylinux containers.
      - name: set up python
        if: matrix.os != 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter ${{ matrix.os == 'windows' && 'python' || (matrix.interpreter || '3.10 3.11 3.12 3.13') }}
          rust-toolchain: stable
          docker-options: -e CI

      - run: ${{ (matrix.os == 'windows' && 'dir') || 'ls -lh' }} dist/

      - uses: actions/upload-artifact@v4
        with:
          name: pypi_files_${{ matrix.os }}_${{ matrix.target }}_${{ matrix.interpreter || 'all' }}_${{ matrix.manylinux }}
          path: dist


  inspect-pypi-assets:
    needs: [build, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: get dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi_files_*
          merge-multiple: true
          path: dist

      - name: list dist files
        run: |
          ls -lh dist/
          ls -l dist/
          echo "`ls dist | wc -l` files"

      - name: extract and list sdist file
        run: |
          mkdir sdist-files
          tar -xvf dist/*.tar.gz -C sdist-files
          tree -a sdist-files

      - name: extract and list wheel file
        run: |
          ls dist/*cp310-manylinux*x86_64.whl | head -n 1
          python -m zipfile --list `ls dist/*cp310-abi3-manylinux*x86_64.whl | head -n 1`

  test-builds-arch:
    name: test build on ${{ matrix.target }}-${{ matrix.distro }}
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [aarch64]
        distro: ['ubuntu24.04']
        include:
          - target: aarch64
            distro: alpine_latest

    steps:
      - uses: actions/checkout@v4

      - name: get dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi_files_linux_*
          merge-multiple: true
          path: dist

      - uses: uraimo/run-on-arch-action@v3
        name: install & test
        with:
          arch: ${{ matrix.target }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          install: |
            set -x
            if command -v apt-get &> /dev/null; then
              echo "installing python & pip with apt-get..."
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-pip python3-venv git curl
            else
              echo "installing python & pip with apk..."
              apk update
              apk add python3 py3-pip git curl
            fi
          run: |
            set -x
            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install -U pip
            python -m pip install pytest syrupy jinja2 pytest-cov 'coverage[toml]' pytest-asyncio pytest-benchmark textual
            python -m pip install netext --find-links dist --force-reinstall --no-index --no-deps
            pytest -m "not exact_rendering"

  test-builds-os:
    name: test build on ${{ matrix.os }}
    needs: [build]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]

    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: py313-testing
          cache: true
          locked: true

      - name: get dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi_files_*
          merge-multiple: true
          path: dist

      - run: pixi run -e py313-testing pip install netext --find-links dist --force-reinstall --no-index --no-deps
      - run: pixi run -e py313-testing pytest
        if: matrix.os != 'windows'

      - run: pixi run -e py313-testing pytest --ignore=tests/snapshot_tests
        if: matrix.os == 'windows'

  release:
    needs: [test-builds-arch, test-builds-os, build-sdist]
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: get dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi_files_*
          merge-multiple: true
          path: dist

      - name: upload to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/


  publish-docs:
    name: Publish documentation
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: test-v3

      - name: set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: docs
          cache: true
          locked: true

      - run: pixi run -e docs mkdocs gh-deploy --force
